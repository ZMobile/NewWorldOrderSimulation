world:
  seed: 42
  width: 50
  height: 50
  resourceDensity: 0.3
  terrainNoise:
    octaves: 6
    persistence: 0.5

agents:
  count: 200
  archetypeDistribution:
    # Capital/business-focused
    ENTREPRENEUR: 0.06
    INNOVATOR: 0.04
    ACCUMULATOR: 0.04
    AUTOMATOR: 0.04
    OPTIMIZER: 0.05
    SPECULATOR: 0.03
    # Labor/service-focused
    WORKER: 0.15
    PROVIDER: 0.06
    ARTISAN: 0.06
    HOMESTEADER: 0.05
    # Community/governance-focused
    COOPERATOR: 0.08
    ORGANIZER: 0.04
    POLITICIAN: 0.03
    REGULATOR: 0.03
    PHILANTHROPIST: 0.03
    # Property-focused
    LANDLORD: 0.04
    # Adversarial/passive
    EXPLOITER: 0.04
    FREE_RIDER: 0.07
    # Total: ~1.00 (rounding)
  perceptionRadius: 7

robots:
  initialCost: 800
  costDecayRate: 0.05
  initialEfficiency: 1.2
  efficiencyGrowthRate: 0.03

meas:
  enabled: true
  formulaVersion: "v0.1.0"
  ubiEnabled: true
  ubiAdequacyTarget: 0.85
  baseTransactionTax: 0.005

llm:
  provider: "anthropic"
  apiKey: ""  # Set here or via ANTHROPIC_API_KEY env var
  apiBaseUrl: "https://api.anthropic.com"
  agentModel: "claude-sonnet-4-6"
  complexModel: "claude-opus-4-6"       # Used for coherence audit + world events (yearly, ~$3 total)
  gameMasterModel: "claude-sonnet-4-6"  # Used for routine GM: infrastructure eval, novel actions, research
  maxAgentCallsPerTick: 50
  maxGameMasterCallsPerTick: 20
  totalBudgetUsd: 50.0
  cacheEnabled: true
  cacheTtlTicks: 5

simulation:
  ticksPerYear: 12
  totalYears: 10
  snapshotInterval: 3
  metricsInterval: 1

events:
  resourceDiscoveryProbability: 0.02
  techBreakthroughProbability: 0.01
  environmentalCrisisThreshold: 0.3
